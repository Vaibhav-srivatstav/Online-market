<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Online Market</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .not-found {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: radial-gradient(ellipse at 50% 40%, rgba(232,197,71,0.06) 0%, transparent 60%);
    }
    .num {
      font-family: 'Fraunces', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700; line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px var(--border);
      margin-bottom: 1rem;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
    .not-found h2 { font-family:'Fraunces',serif; font-size:1.75rem; margin-bottom:0.75rem; }
    .not-found p { color: var(--text-muted); margin-bottom:2rem; }
    .actions { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">Online<span>Market</span></a>
</nav>
<div class="not-found">
  <div>
    <div class="num">404</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="actions">
      <a href="/" class="btn-primary">← Back to Store</a>
      <a href="/orders" class="btn-outline">My Orders</a>
    </div>
  </div>
</div>
</body>
</html>

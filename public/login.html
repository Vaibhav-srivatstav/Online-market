<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Online Market</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <a href="/" style="color:var(--text-muted);text-decoration:none;font-size:0.85rem;">← Back to Store</a>
    <div style="text-align:center;margin:1.5rem 0;">
      <div style="font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;">Online<span style="color:var(--accent)">Market
      </span></div>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to your account</p>

    <div id="errorMsg" style="display:none;background:rgba(248,113,113,0.1);border:1px solid var(--error);border-radius:8px;padding:0.75rem;color:var(--error);font-size:0.875rem;margin-bottom:1rem;"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Your password" onkeydown="if(event.key==='Enter')login()"/>
    </div>

    <button class="btn-primary" style="width:100%;justify-content:center;padding:0.875rem;margin-top:0.5rem;" onclick="login()" id="loginBtn">Sign In</button>

    <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted);font-size:0.875rem;">
      Don't have an account? <a href="/register" style="color:var(--accent);text-decoration:none;font-weight:600;">Create one</a>
    </p>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { errEl.textContent = 'Please fill all fields'; errEl.style.display = 'block'; return; }

  btn.textContent = 'Signing in...'; btn.disabled = true;
  try {
    await api.post('/api/auth/login', { email, password });
    showToast('Welcome back!', 'success');
    setTimeout(() => window.location.href = '/', 1000);
  } catch (err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}
</script>
</body>
</html>
